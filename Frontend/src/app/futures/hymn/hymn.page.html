<div class="hymn-page-layout">

  <!-- LEFT PANEL: PDF Sheet Music / Lyrics and Video tabs -->
  <section class="hymn-content-panel">
    <div class="hymn-tabs">
      <button class="hymn-tab hymn-tab--active">PDF Sheet Music</button>
      <button class="hymn-tab">Lyrics and Video</button>
    </div>
    <div class="hymn-tab-body">
      <!-- Tab content will go here -->
    </div>
  </section>

  <!-- RIGHT PANEL: Notes -->
  <aside class="hymn-notes-panel">
    <h2 class="hymn-notes-title">GHI CHÚ CỦA BẠN</h2>

    <div class="hymn-notes-input-wrapper">
      <span class="hymn-notes-input-icon">✏️</span>
      <input type="text" class="hymn-notes-input" placeholder="Nhập ghi chú mới..." />
    </div>

    <div class="hymn-notes-history">
      <p class="hymn-notes-history-label">Lịch sử ghi chú:</p>

      <div class="hymn-note-item">
        <span class="hymn-note-text">Cảm thấy bình an khi nghe bài hát này...</span>
        <div class="hymn-note-actions">
          <span class="hymn-note-btn hymn-note-btn--view">⇒</span>
          <span class="hymn-note-btn hymn-note-btn--delete">✕</span>
        </div>
      </div>

      <div class="hymn-note-item">
        <span class="hymn-note-text">Cần áp dụng lời khuyên từ Isaiah 60:1...</span>
        <div class="hymn-note-actions">
          <span class="hymn-note-btn hymn-note-btn--view">⇒</span>
          <span class="hymn-note-btn hymn-note-btn--delete">✕</span>
        </div>
      </div>
    </div>

    <button class="hymn-notes-cta">
      <span>📋</span> XEM TOÀN BỘ GHI CHÚ →
    </button>
  </aside>

</div>
