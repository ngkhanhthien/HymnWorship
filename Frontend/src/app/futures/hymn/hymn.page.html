<div class="hymn-layout">
  <!-- Left: Content Tabs -->
  <section class="hymn-content-panel">
    <div class="tab-bar">
      <button class="tab-btn active">PDF Sheet Music</button>
      <button class="tab-btn">Lyrics and Video</button>
    </div>
    <div class="tab-body">
      @if (hymnTitle()) {
        <p class="hymn-now-label">{{ hymnNumber() }}. {{ hymnTitle() }}</p>
      }
      <p class="coming-soon-label">Coming Soon</p>
    </div>
  </section>

  <!-- Right: Notes Panel -->
  <aside class="hymn-notes-panel">
    <h3 class="notes-title">YOUR NOTES</h3>

    <div class="note-input-wrapper">
      <span class="note-icon">✏️</span>
      <input class="note-input" type="text" placeholder="Add a new note..." />
    </div>

    <div class="notes-history">
      <p class="notes-history-label">Note history:</p>
      <ul class="notes-list">
        <li class="note-item">
          <span class="note-text">Felt at peace while listening to this song... ⇒</span>
          <button class="note-delete">✖</button>
        </li>
        <li class="note-item">
          <span class="note-text">Need to apply the counsel from Isaiah 60:1... ⇒</span>
          <button class="note-delete">✖</button>
        </li>
      </ul>
    </div>

    <button class="notes-view-all-btn">📋 VIEW ALL NOTES →</button>
  </aside>
</div>
