<div class="grid grid-cols-1 md:grid-cols-5 gap-6 p-6 h-full">
  <!-- Cột Trái (Không gian âm nhạc) -->
  <div class="md:col-span-3 border-2 border-emerald-500 rounded p-6 flex flex-col">
    <h2 class="text-xl font-bold text-blue-800 mb-6 uppercase">Music Space</h2>
    
    <!-- Music Player Box -->
    <div class="bg-blue-50 rounded-3xl min-h-[280px] border-2 border-blue-400 p-6 flex items-center justify-center mb-8 relative">
      <!-- Decorator dot/circle (optional placeholder) -->
      <div class="absolute -top-3 left-1/2 transform -translate-x-1/2 w-6 h-6 border-2 border-blue-500 bg-white rounded-full flex items-center justify-center">
        <div class="w-3 h-3 bg-blue-500 rounded-full"></div>
      </div>
      <div class="text-2xl text-gray-800">For today music</div>
    </div>

    <!-- Suggestions List -->
    <div class="mt-auto">
      <h3 class="font-bold text-lg mb-2 text-black">More suggestions:</h3>
      <app-hymn-item number="1001" title="Come, Thou Fount of Every Blessing" />
      <app-hymn-item number="1004" title="I Will Walk with Jesus" />
      <app-hymn-item number="1005" title="His Eye Is on the Sparrow" />
    </div>
  </div>

  <!-- Cột Phải -->
  <div class="md:col-span-2 flex flex-col gap-6">
    <!-- Section: Tiện Ích -->
    <div class="border-2 border-pink-700 rounded p-5 flex flex-col flex-1 min-h-[240px]">
      <h2 class="text-xl font-bold text-pink-800 mb-4 uppercase">Utilities</h2>
      <app-calendar />
    </div>

    <!-- Section: Nhật Ký & Ghi Chú -->
    <div class="border-2 border-pink-700 rounded p-5 flex flex-col flex-1 min-h-[240px]">
      <h2 class="text-xl font-bold text-pink-800 mb-6 uppercase">Journal & Notes</h2>
      <ul class="space-y-6 text-gray-600 text-sm">
        <li class="flex gap-2">
          <span class="text-gray-500 mt-0.5">&bull;</span>
          <span>Experience: Today I feel...</span>
        </li>
        <li class="flex gap-2">
          <span class="text-gray-500 mt-0.5">&bull;</span>
          <span>To-do: Complete devotional reading.</span>
        </li>
      </ul>
    </div>
  </div>
</div>
